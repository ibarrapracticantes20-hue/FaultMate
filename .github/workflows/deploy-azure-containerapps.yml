name: Deploy FaultMate to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - FaultMateWeb/**
      - .github/workflows/deploy-azure-containerapps.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  RESOURCE_GROUP: rg-faultmate-dev-scus
  CONTAINER_APP: ca-faultmate-web-scus

jobs:
  deploy-containerapp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          missing=0
          if [ -z "$AZURE_CLIENT_ID" ]; then
            echo "Missing secret: AZURE_CLIENT_ID"
            missing=1
          fi
          if [ -z "$AZURE_TENANT_ID" ]; then
            echo "Missing secret: AZURE_TENANT_ID"
            missing=1
          fi
          if [ -z "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "Missing secret: AZURE_SUBSCRIPTION_ID"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            echo "Configure the three secrets above with a Service Principal using OIDC before retrying."
            exit 1
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy by refreshing DEPLOY_SHA
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          SHORT_SHA="${GITHUB_SHA::7}"

          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --set-env-vars DEPLOY_SHA="$SHORT_SHA" GH_RUN_ID="${GITHUB_RUN_ID}" \
            --output table

      - name: Verify revision status
        run: |
          az containerapp show \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query "{latestReady:properties.latestReadyRevisionName,latestRevision:properties.latestRevisionName,runningStatus:properties.runningStatus}" \
            --output table
