{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FaultMate</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>

<div class="login-caja">

    <h2>FaultMate</h2>
    <p>Sistema Inteligente de Diagnostico Industrial</p>

    {% if error %}
    <p class="mensaje-error">{{ error }}</p>
    {% endif %}

    <!--
        Usuario de prueba (se crea solo al correr "migrate"):
        usuario: test
        contrasena: test123
    -->
    <form class="formulario" action="{% url 'login' %}" method="post">

        {% csrf_token %}

        <label>Usuario</label>
        <input type="text" name="usuario" placeholder="Escribe tu usuario" required>

        <label>Contrasena</label>
        <input type="password" name="password" placeholder="Escribe tu contrasena" required>

        <button type="submit" class="btn" style="width:100%;">Ingresar</button>

    </form>

</div>

</body>
</html>
