<!DOCTYPE html>
<html>
<head>
    <title>Login FaultMate</title>

    <style>

        body{
            font-family:Arial;
            background: #f4f4f4;
        }

        .login{
            width:350px;
            margin:100px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
        }

    </style>


</head>


<body>


<div class="login">


    <h2>FaultMate Login</h2>

    <p style="text-align:center;">
        Sistema Inteligente de Diagnóstico Industrial
    </p>

    <form action="/dashboard/" method="get">

        <input type="text" placeholder="Usuario">


        <input type="password" placeholder="Contraseña">


        <button type="submit">
            Ingresar
        </button>

    </form> 

</div>
